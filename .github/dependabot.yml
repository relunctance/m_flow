version: 2
updates:
  # ---------------------------------------------------------------------------
  # Python dependencies (pyproject.toml)
  #
  # Strategy: monthly cadence with grouped PRs.
  #   - "python-minor-and-patch" bundles all non-breaking bumps into one PR
  #     so reviewers see at most one routine PR per month.
  #   - "python-major" surfaces breaking bumps in a separate PR for individual
  #     review (e.g. pydantic 2 -> 3, neo4j 6 -> 7).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      python-major:
        update-types:
          - "major"

  # ---------------------------------------------------------------------------
  # GitHub Actions
  #
  # Same monthly + grouped strategy. Major action bumps (e.g. checkout v4 -> v6,
  # codeql-action v3 -> v4) deserve separate review because they typically
  # require workflow-wide audits.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      actions-major:
        update-types:
          - "major"

  # ---------------------------------------------------------------------------
  # Docker images (already on a sensible monthly cadence; left as-is)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/m_flow-frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/m_flow-mcp"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
