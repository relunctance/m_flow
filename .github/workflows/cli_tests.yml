# ┌──────────────────────────────────────────────────────────────────────────┐
# │ M-Flow CI Pipeline: CLI Regression Suite                                │
# │                                                                          │
# │ Ensures the m_flow CLI behaves correctly across subcommands, flags, and │
# │ error paths. Unit and integration scopes run through a consolidated     │
# │ matrix; end-to-end command verification runs as a separate job.         │
# │                                                                          │
# │ Owner: M-Flow Platform Engineering                                      │
# └──────────────────────────────────────────────────────────────────────────┘
name: "cli-gate | CLI Regression Suite"

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.11.x'
        required: false
    secrets:
      LLM_PROVIDER: {required: true}
      LLM_MODEL: {required: true}
      LLM_ENDPOINT: {required: false}
      LLM_API_KEY: {required: true}
      LLM_API_VERSION: {required: false}
      EMBEDDING_PROVIDER: {required: true}
      EMBEDDING_MODEL: {required: true}
      EMBEDDING_ENDPOINT: {required: false}
      EMBEDDING_API_KEY: {required: true}
      EMBEDDING_API_VERSION: {required: false}

permissions: {contents: read}

env: {RUNTIME__LOG_LEVEL: ERROR, ENV: 'dev'}

concurrency:
  group: mflow-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── CLI pytest matrix (unit + integration scopes) ──────────────────────
  cli-pytest-matrix:
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    name: "CLI ${{ matrix.scope }} checks"
    defaults: {run: {shell: bash}}
    strategy:
      fail-fast: false
      matrix:
        scope: [unit, integration]
        include:
          - scope: unit
            test_dir: m_flow/tests/cli_tests/cli_unit_tests/
          - scope: integration
            test_dir: m_flow/tests/cli_tests/cli_integration_tests/
    env:
      LLM_PROVIDER: openai
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}"}

      - name: "Execute CLI ${{ matrix.scope }} tests"
        run: uv run pytest ${{ matrix.test_dir }} -v

  # ── CLI end-to-end command verification ────────────────────────────────
  cli-e2e-commands:
    needs: [cli-pytest-matrix]
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    name: "CLI end-to-end command matrix"
    defaults: {run: {shell: bash}}
    env:
      LLM_PROVIDER: openai
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_VERSION: ${{ secrets.LLM_API_VERSION }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      EMBEDDING_ENDPOINT: ${{ secrets.EMBEDDING_ENDPOINT }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      EMBEDDING_API_VERSION: ${{ secrets.EMBEDDING_API_VERSION }}
    steps:
      - uses: actions/checkout@v4
        name: "Clone M-Flow repository"
        with: {fetch-depth: 0}

      - uses: ./.github/actions/m_flow_setup
        name: "Configure runtime environment"
        with: {python-version: "${{ inputs.python-version }}"}

      - name: "Verify top-level help output"
        run: |
          uv run python -m m_flow.cli.app --help
          uv run python -m m_flow.cli.app --version
          uv run python -m m_flow.cli.app add --help
          uv run python -m m_flow.cli.app search --help
          uv run python -m m_flow.cli.app memorize --help
          uv run python -m m_flow.cli.app delete --help
          uv run python -m m_flow.cli.app config --help

      - name: "Verify config subcommand help"
        run: |
          uv run python -m m_flow.cli.app config get --help
          uv run python -m m_flow.cli.app config set --help
          uv run python -m m_flow.cli.app config list --help
          uv run python -m m_flow.cli.app config unset --help
          uv run python -m m_flow.cli.app config reset --help

      - name: "Assert proper error handling"
        run: |
          ! uv run python -m m_flow.cli.app invalid_command

          ! uv run python -m m_flow.cli.app search

          ! uv run python -m m_flow.cli.app search "test" --query-type INVALID_TYPE

          ! uv run python -m m_flow.cli.app memorize --chunker InvalidChunker
